#config/lily58.conf

# 开启蓝牙功能
CONFIG_BT_CTLR=y

# 开启省电模式 (对无线键盘至关重要)
CONFIG_ZMK_SLEEP=y

# ----------------- 分体键盘设置 -----------------
# 开启分体键盘支持
CONFIG_ZMK_SPLIT=y
# 如果你的PCB是LILY58 Rev1，请取消下面这行的注释
# CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# ----------------- 可选功能 (根据你的硬件选择) -----------------
# 如果你安装了OLED屏幕，取消下面两行的注释
# CONFIG_ZMK_DISPLAY=y
# CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y

# 如果你安装了RGB底灯 (Underglow)，取消下面两行的注释
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n # 如果你的RGB直接由主控供电，设为n

# ----------------- 行为设置 -----------------
# 开启电源管理的蓝牙广播，以便在未连接时也能看到电量
CONFIG_ZMK_PM_SOFT_OFF=y
